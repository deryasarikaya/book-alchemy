<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Library</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f4;
        --surface: #ffffff;
        --surface-soft: #eef3f0;
        --text: #17211c;
        --muted: #68736d;
        --line: #dfe7e2;
        --accent: #0f766e;
        --accent-strong: #115e59;
        --danger: #b42318;
        --danger-soft: #fff1ef;
        --shadow: 0 18px 45px rgba(23, 33, 28, 0.09);
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(15, 118, 110, 0.13), transparent 32rem),
          linear-gradient(135deg, #fbfcfa 0%, var(--bg) 48%, #edf3ef 100%);
      }

      .page {
        width: min(1120px, calc(100% - 32px));
        margin: 0 auto;
        padding: 48px 0;
      }

      .header {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 24px;
        align-items: end;
        padding-bottom: 28px;
        border-bottom: 1px solid var(--line);
      }

      .eyebrow {
        margin: 0 0 10px;
        color: var(--accent-strong);
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      h1 {
        max-width: 720px;
        margin: 0;
        font-size: clamp(2.25rem, 5vw, 4.75rem);
        line-height: 0.94;
        letter-spacing: 0;
      }

      .subtitle {
        max-width: 640px;
        margin: 16px 0 0;
        color: var(--muted);
        font-size: 1.05rem;
        line-height: 1.6;
      }

      .controls {
        display: grid;
        grid-template-columns: auto minmax(280px, 420px);
        gap: 14px;
        align-items: center;
        margin: 28px 0 30px;
      }

      .sort-links,
      .search-form {
        min-height: 52px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.76);
        box-shadow: 0 10px 28px rgba(23, 33, 28, 0.06);
        backdrop-filter: blur(16px);
      }

      .sort-links {
        display: inline-flex;
        width: fit-content;
        align-items: center;
        padding: 5px;
        border-radius: 999px;
      }

      .sort-links a {
        display: inline-flex;
        align-items: center;
        min-height: 40px;
        padding: 0 16px;
        border-radius: 999px;
        color: var(--muted);
        font-size: 0.93rem;
        font-weight: 750;
        text-decoration: none;
        transition: background 160ms ease, color 160ms ease, transform 160ms ease;
      }

      .sort-links a:hover {
        color: var(--text);
        background: var(--surface-soft);
        transform: translateY(-1px);
      }

      .search-form {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        overflow: hidden;
        border-radius: 16px;
      }

      .search-form input {
        width: 100%;
        min-width: 0;
        border: 0;
        padding: 0 18px;
        color: var(--text);
        background: transparent;
        font: inherit;
        outline: none;
      }

      .search-form input::placeholder {
        color: #89938d;
      }

      .search-form button,
      .delete-button {
        border: 0;
        font: inherit;
        font-weight: 800;
        cursor: pointer;
        transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
      }

      .search-form button {
        margin: 5px;
        padding: 0 18px;
        border-radius: 12px;
        color: #ffffff;
        background: var(--accent);
        box-shadow: 0 10px 18px rgba(15, 118, 110, 0.22);
      }

      .search-form button:hover,
      .delete-button:hover {
        transform: translateY(-1px);
      }

      .search-form button:hover {
        background: var(--accent-strong);
      }

      .message {
        margin: 0 0 22px;
        padding: 14px 16px;
        border: 1px solid #cfe8df;
        border-radius: 14px;
        color: #0e665f;
        background: #effaf6;
        font-weight: 700;
      }

      .book-list {
        display: grid;
        gap: 16px;
      }

      .book {
        display: grid;
        grid-template-columns: 96px minmax(0, 1fr) auto;
        gap: 20px;
        align-items: center;
        padding: 18px;
        border: 1px solid rgba(223, 231, 226, 0.9);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.84);
        box-shadow: var(--shadow);
      }

      .book img {
        width: 96px;
        aspect-ratio: 2 / 3;
        border-radius: 6px;
        object-fit: cover;
        background: linear-gradient(145deg, #dce7e0, #f6f8f5);
        box-shadow: 0 12px 26px rgba(23, 33, 28, 0.16);
      }

      .book-info {
        min-width: 0;
      }

      .book h3 {
        margin: 0 0 8px;
        overflow-wrap: anywhere;
        font-size: clamp(1.13rem, 2vw, 1.45rem);
        line-height: 1.18;
        letter-spacing: 0;
      }

      .book p {
        margin: 0;
        color: var(--muted);
        font-size: 0.98rem;
        line-height: 1.5;
      }

      .delete-form {
        justify-self: end;
      }

      .delete-button {
        min-height: 42px;
        padding: 0 14px;
        border: 1px solid #ffd3ce;
        border-radius: 12px;
        color: var(--danger);
        background: var(--danger-soft);
      }

      .delete-button:hover {
        background: #ffe5e1;
        box-shadow: 0 10px 18px rgba(180, 35, 24, 0.12);
      }

      @media (max-width: 760px) {
        .page {
          width: min(100% - 24px, 640px);
          padding: 30px 0;
        }

        .header,
        .controls {
          grid-template-columns: 1fr;
        }

        .controls {
          gap: 12px;
        }

        .sort-links,
        .search-form {
          width: 100%;
        }

        .sort-links a {
          flex: 1;
          justify-content: center;
          padding: 0 10px;
        }

        .book {
          grid-template-columns: 76px minmax(0, 1fr);
          gap: 16px;
        }

        .book img {
          width: 76px;
        }

        .delete-form {
          grid-column: 1 / -1;
          justify-self: stretch;
        }

        .delete-button {
          width: 100%;
        }
      }

      @media (max-width: 420px) {
        .search-form {
          grid-template-columns: 1fr;
          padding: 5px;
        }

        .search-form input {
          min-height: 42px;
          padding: 0 12px;
        }

        .search-form button {
          min-height: 42px;
          margin: 0;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <header class="header">
        <div>
          <p class="eyebrow">Personal library</p>
          <h1>Browse your books.</h1>
          <p class="subtitle">Search the collection, change the sort order, and keep your shelves tidy.</p>
        </div>
      </header>

      <section class="controls" aria-label="Library controls">
        <nav class="sort-links" aria-label="Sort books">
          <a href="/?sort_by=title">Sort by Title</a>
          <a href="/?sort_by=author">Sort by Author</a>
        </nav>

        <form class="search-form" action="/" method="GET">
          <input type="text" name="search" placeholder="Search books..." aria-label="Search books">
          <button type="submit">Search</button>
        </form>
      </section>

      {% if message %}
        <p class="message">{{ message }}</p>
      {% endif %}

      <section class="book-list" aria-label="Books">
        {% for book in books %}
        <article class="book">
          <img src="https://covers.openlibrary.org/b/isbn/{{ book.isbn }}-M.jpg" alt="{{ book.title }}">
          <div class="book-info">
            <h3>{{ book.title }}</h3>
            <p>{{ book.author.name }}</p>
          </div>
          <form class="delete-form" action="/book/{{ book.id }}/delete" method="POST">
            <button class="delete-button" type="submit">Delete Book</button>
          </form>
        </article>
        {% endfor %}
      </section>
    </main>
  </body>
</html>
